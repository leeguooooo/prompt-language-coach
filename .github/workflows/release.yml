name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 0.8.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run verification
        run: |
          python3 -m unittest \
            tests.shared.test_config_io \
            tests.shared.test_prompt_builder \
            tests.hooks.test_claude_hook_output \
            tests.hooks.test_codex_hook_install \
            tests.scripts.test_analyze_progress \
            tests.scripts.test_bump_version \
            tests.scripts.test_manage_language_coach \
            -v

      - name: Bump version in all plugin manifests
        run: python3 scripts/bump_version.py "${{ github.event.inputs.version }}"

      - name: Build changelog
        run: python3 scripts/build_changelog.py "${{ github.event.inputs.version }}"

      - name: Commit & tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .cursor-plugin/plugin.json .codex-plugin/plugin.json CHANGELOG.md
          git commit -m "chore: release v${{ github.event.inputs.version }}" || echo "Nothing to commit"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD --tags

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          body: |
            Prompt Language Coach v${{ github.event.inputs.version }}

            This release bumps the shipped plugin version for:
            - Codex
            - Claude Code
            - Cursor

            Source of truth:
            - `.codex-plugin/plugin.json`
            - `.claude-plugin/plugin.json`
            - `.cursor-plugin/plugin.json`

      - name: Notify plugins repo to sync marketplace
        if: ${{ secrets.PLUGINS_REPO_TOKEN != '' }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PLUGINS_REPO_TOKEN }}
          repository: leeguooooo/plugins
          event-type: sync-language-coach-version
          client-payload: '{"version": "${{ github.event.inputs.version }}"}'
